name: Generate Daily Current Affairs Quiz

on:
  schedule:
    # Runs precisely at minute 0 of every 5th hour (e.g., 12:00, 5:00, 10:00, etc.)
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  build-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install axios

      - name: Run Quiz Generation Script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REGION: "Telangana, Andhra Pradesh, India History, Indian Geography, Mechanical Engineering"
        run: node generate-quiz.js

      - name: Commit and Push updated quiz data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clean fallback sync: grab latest changes, ignore local working branch conflicts
          git fetch origin main
          git reset --mixed origin/main
          
          git add data/today.json
          if ! git diff-index --quiet HEAD; then
            # Removed [Skip CI] so Vercel builds the fresh today.json file on every push
            git commit -m "Automated update: Today's Quiz"
            git push origin main --force
          else
            echo "No data changes detected. Skipping push."
          fi
