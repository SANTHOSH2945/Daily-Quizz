name: Generate Daily Current Affairs Quiz

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install axios

      - name: Run Quiz Generation Script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate-quiz.js

      - name: Commit and Push updated quiz data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/today.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated update: Today's Quiz [Skip CI]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No data changes detected. Skipping push."
          fi
